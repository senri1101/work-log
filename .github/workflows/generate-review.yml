name: 自己評価生成

on:
  workflow_dispatch:
    inputs:
      period:
        description: レビュー期間。例: 2026-H1
        required: true
        type: string
      from:
        description: 開始日を上書きする場合に指定
        required: false
        type: string
      to:
        description: 終了日を上書きする場合に指定
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v5

      - name: uv をセットアップ
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: 依存関係を同期
        run: uv sync --frozen

      - name: テスト実行
        run: uv run python -m unittest discover -s tests -v

      - name: 自己評価ドラフトを生成
        run: |
          CMD="uv run work-log generate-review --period '${{ github.event.inputs.period }}'"
          if [ -n "${{ github.event.inputs.from }}" ]; then
            CMD="$CMD --from '${{ github.event.inputs.from }}'"
          fi
          if [ -n "${{ github.event.inputs.to }}" ]; then
            CMD="$CMD --to '${{ github.event.inputs.to }}'"
          fi
          eval "$CMD"

      - name: コミットして push
        run: |
          if git diff --quiet; then
            echo "差分がないためコミットしません。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reviews
          git commit -m "chore: 自己評価を生成 ${{ github.event.inputs.period }}"
          git push
