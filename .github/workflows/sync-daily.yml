name: 日報同期

on:
  workflow_dispatch:
    inputs:
      date:
        description: 対象日。未指定なら当日分を同期
        required: false
        type: string
  schedule:
    - cron: "0 13 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      NOTION_DATE_PROPERTY: ${{ secrets.NOTION_DATE_PROPERTY }}
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v5

      - name: uv をセットアップ
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: 依存関係を同期
        run: uv sync --frozen

      - name: テスト実行
        run: uv run python -m unittest discover -s tests -v

      - name: 日報を同期
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            uv run work-log sync-daily --date "${{ github.event.inputs.date }}"
          else
            uv run work-log sync-daily
          fi

      - name: コミットして push
        run: |
          if git diff --quiet; then
            echo "差分がないためコミットしません。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily
          git commit -m "chore: 日報を同期"
          git push
